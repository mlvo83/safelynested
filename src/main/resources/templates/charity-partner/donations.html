<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donations - SafelyNested</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <th:block th:replace="~{charity-partner/fragments/sidebar :: sidebar-styles}"></th:block>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <th:block th:replace="~{charity-partner/fragments/sidebar :: sidebar('donations')}"></th:block>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 main-content">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2"><i class="fas fa-dollar-sign me-2"></i> Donations</h1>
                <a th:href="@{/charity-partner/donations/record}" class="btn btn-primary">
                    <i class="fas fa-plus me-1"></i> Record Donation
                </a>
            </div>

            <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
                <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card">
                <div class="card-body p-0">
                    <div class="table-responsive" th:if="${!donations.isEmpty()}">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Date</th>
                                    <th>Donor</th>
                                    <th>Gross Amount</th>
                                    <th>Fee Paid</th>
                                    <th>Net Amount</th>
                                    <th>Nights</th>
                                    <th>Status</th>
                                    <th>Source</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="donation : ${donations}">
                                    <td>
                                        <span th:if="${donation.dateReceived != null}" th:text="${donation.dateReceived}"></span>
                                        <span th:if="${donation.dateReceived == null}" th:text="${#temporals.format(donation.donatedAt, 'yyyy-MM-dd')}"></span>
                                    </td>
                                    <td th:text="${donation.donorDisplayName}"></td>
                                    <td th:text="'$' + ${#numbers.formatDecimal(donation.grossAmount, 1, 2)}"></td>
                                    <td th:text="'$' + ${#numbers.formatDecimal(donation.platformFee.add(donation.facilitatorFee), 1, 2)}"></td>
                                    <td class="text-success fw-semibold" th:text="'$' + ${#numbers.formatDecimal(donation.netAmount, 1, 2)}"></td>
                                    <td th:text="${donation.nightsFunded ?: '—'}"></td>
                                    <td>
                                        <span class="badge"
                                              th:classappend="${donation.status.name() == 'VERIFIED'} ? 'bg-success' :
                                                              (${donation.status.name() == 'PENDING'} ? 'bg-warning text-dark' :
                                                              (${donation.status.name() == 'ALLOCATED'} ? 'bg-info' : 'bg-secondary'))"
                                              th:text="${donation.status.displayName}"></span>
                                    </td>
                                    <td>
                                        <span th:if="${donation.paymentSource == 'CHARITY_RECORDED'}" class="badge bg-primary">Recorded</span>
                                        <span th:if="${donation.paymentSource == 'STRIPE'}" class="badge bg-info">Online</span>
                                        <span th:if="${donation.paymentSource == 'MANUAL'}" class="badge bg-secondary">Manual</span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div th:if="${donations.isEmpty()}" class="text-center py-5 text-muted">
                        <i class="fas fa-hand-holding-heart fa-3x mb-3 d-block" style="opacity: 0.3;"></i>
                        <h5>No donations recorded yet</h5>
                        <p>Record your first donation to get started.</p>
                        <a th:href="@{/charity-partner/donations/record}" class="btn btn-primary mt-2">
                            <i class="fas fa-plus me-1"></i> Record Donation
                        </a>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
