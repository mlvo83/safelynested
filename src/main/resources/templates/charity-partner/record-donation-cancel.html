<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Cancelled - SafelyNested</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <th:block th:replace="~{charity-partner/fragments/sidebar :: sidebar-styles}"></th:block>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <th:block th:replace="~{charity-partner/fragments/sidebar :: sidebar('donations')}"></th:block>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 main-content">
            <div class="pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2"><i class="fas fa-exclamation-triangle text-warning me-2"></i> Payment Cancelled</h1>
            </div>

            <div class="row justify-content-center">
                <div class="col-lg-6">
                    <div class="card mb-4">
                        <div class="card-body text-center py-5">
                            <div style="width: 70px; height: 70px; background: #fef3c7; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;">
                                <i class="fas fa-times text-warning fa-2x"></i>
                            </div>
                            <h3 class="mb-2">Donation Not Recorded</h3>
                            <p class="text-muted">The fee payment was not completed, so the donation was not recorded in the system.</p>
                            <div class="alert alert-success mt-3 mb-0">
                                <i class="fas fa-shield-alt me-2"></i>
                                No charges were made to your payment method.
                            </div>
                        </div>
                    </div>

                    <div class="d-flex gap-3 justify-content-center">
                        <a th:href="@{/charity-partner/donations/record}" class="btn btn-primary">
                            <i class="fas fa-redo me-1"></i> Try Again
                        </a>
                        <a th:href="@{/charity-partner/dashboard}" class="btn btn-outline-secondary">
                            <i class="fas fa-tachometer-alt me-1"></i> Dashboard
                        </a>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
