<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Application Status - SafelyNested</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: #f5f7fa; min-height: 100vh; }
        .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .navbar-brand { font-size: 24px; font-weight: bold; }
        .nav-links { display: flex; gap: 10px; }
        .nav-link { color: white; text-decoration: none; padding: 8px 16px; border-radius: 5px; transition: background 0.3s; }
        .nav-link:hover { background: rgba(255,255,255,0.2); }
        .container { max-width: 700px; margin: 60px auto; padding: 0 20px; }
        .card { background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 30px; margin-bottom: 20px; }
        h1 { font-size: 28px; color: #333; margin-bottom: 10px; text-align: center; }
        .subtitle { color: #666; font-size: 16px; margin-bottom: 30px; text-align: center; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; font-size: 14px; }
        .form-group input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
        .form-group input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 12px 24px; border-radius: 5px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; }
        .btn-primary:hover { opacity: 0.9; }
        .status-badge { padding: 6px 16px; border-radius: 20px; font-size: 14px; font-weight: 600; display: inline-block; }
        .status-PENDING { background: #fef3c7; color: #92400e; }
        .status-UNDER_REVIEW { background: #dbeafe; color: #1e40af; }
        .status-APPROVED { background: #d1fae5; color: #065f46; }
        .status-REJECTED { background: #fee2e2; color: #991b1b; }
        .result-card { border-left: 4px solid #667eea; }
        .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f0f0f0; }
        .info-row:last-child { border-bottom: none; }
        .info-label { font-weight: 600; color: #555; }
        .info-value { color: #333; }
        .not-found { text-align: center; color: #666; padding: 20px; }
        .not-found h3 { color: #991b1b; margin-bottom: 10px; }
        .rejection-box { background: #fef3c7; padding: 15px; border-radius: 8px; margin-top: 15px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">SafelyNested</div>
        <div class="nav-links">
            <a href="/" class="nav-link">Home</a>
            <a href="/charity-application/apply" class="nav-link">Apply</a>
            <a href="/login" class="nav-link">Partner Login</a>
        </div>
    </nav>

    <div class="container">
        <h1>Check Application Status</h1>
        <p class="subtitle">Enter your application number and email to check the status of your charity partner application.</p>

        <div class="card">
            <form action="/charity-application/status" method="post" th:action="@{/charity-application/status}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group">
                    <label>Application Number</label>
                    <input type="text" name="applicationNumber" required placeholder="e.g., CA-2026-0001"
                           th:value="${applicationNumber}" style="text-transform: uppercase;">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" required placeholder="The email used in your application"
                           th:value="${email}">
                </div>
                <button type="submit" class="btn-primary">Check Status</button>
            </form>
        </div>

        <!-- Results -->
        <div th:if="${found}" class="card result-card">
            <h3 style="margin-bottom: 15px;">Application Details</h3>
            <div class="info-row">
                <span class="info-label">Application Number</span>
                <span class="info-value" th:text="${app.applicationNumber}"></span>
            </div>
            <div class="info-row">
                <span class="info-label">Organization</span>
                <span class="info-value" th:text="${app.charityName}"></span>
            </div>
            <div class="info-row">
                <span class="info-label">Contact</span>
                <span class="info-value" th:text="${app.contactName}"></span>
            </div>
            <div class="info-row">
                <span class="info-label">Status</span>
                <span class="info-value">
                    <span class="status-badge" th:classappend="'status-' + ${app.status}"
                          th:text="${app.status.displayName}"></span>
                </span>
            </div>
            <div class="info-row">
                <span class="info-label">Submitted</span>
                <span class="info-value" th:text="${#temporals.format(app.createdAt, 'MMMM d, yyyy')}"></span>
            </div>
            <div class="info-row" th:if="${app.reviewedAt != null}">
                <span class="info-label">Reviewed</span>
                <span class="info-value" th:text="${#temporals.format(app.reviewedAt, 'MMMM d, yyyy')}"></span>
            </div>

            <div th:if="${app.rejected}" class="rejection-box">
                <strong>Reason:</strong>
                <p th:text="${app.rejectionReason}"></p>
            </div>
        </div>

        <div th:if="${found != null && !found}" class="card not-found">
            <h3>Application Not Found</h3>
            <p th:text="${notFoundMessage}"></p>
        </div>
    </div>
</body>
</html>
