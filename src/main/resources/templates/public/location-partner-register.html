<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Location Partner Account - SafelyNested</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: #f5f7fa; min-height: 100vh; }
        .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .navbar-brand { font-size: 24px; font-weight: bold; }
        .nav-links { display: flex; gap: 10px; }
        .nav-link { color: white; text-decoration: none; padding: 8px 16px; border-radius: 5px; transition: background 0.3s; }
        .nav-link:hover { background: rgba(255,255,255,0.2); }
        .container { max-width: 600px; margin: 60px auto; padding: 0 20px; }
        .card { background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden; }
        .card-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; text-align: center; }
        .card-header h1 { font-size: 24px; margin-bottom: 8px; }
        .card-header p { opacity: 0.9; font-size: 14px; }
        .card-body { padding: 30px; }
        .partner-badge { background: #dbeafe; color: #1e40af; padding: 10px 16px; border-radius: 8px; text-align: center; margin-bottom: 24px; font-weight: 600; }
        .alert { padding: 15px; border-radius: 5px; margin-bottom: 20px; }
        .alert-danger { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; font-size: 14px; }
        .form-group input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
        .form-group input:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
        .form-group input[readonly] { background: #f8f9fa; color: #666; cursor: not-allowed; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .required::after { content: " *"; color: #dc3545; }
        .help-text { font-size: 12px; color: #888; margin-top: 3px; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 14px 28px; border-radius: 5px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; }
        .btn-primary:hover { opacity: 0.9; }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        .error-page { text-align: center; padding: 60px 20px; }
        .error-icon { width: 64px; height: 64px; background: #fee2e2; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
        .error-icon svg { width: 32px; height: 32px; color: #ef4444; }
        .error-page h2 { color: #333; margin-bottom: 10px; }
        .error-page p { color: #666; margin-bottom: 20px; }
        .btn-outline { display: inline-block; padding: 12px 24px; border: 2px solid #667eea; color: #667eea; border-radius: 5px; text-decoration: none; font-weight: 600; }
        @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">SafelyNested</div>
        <div class="nav-links">
            <a href="/" class="nav-link">Home</a>
            <a href="/login" class="nav-link">Login</a>
        </div>
    </nav>

    <div class="container">
        <!-- Error state (invalid/expired token) -->
        <div th:if="${error != null && token == null}" class="card">
            <div class="card-body error-page">
                <div class="error-icon">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
                </div>
                <h2>Unable to Register</h2>
                <p th:text="${error}"></p>
                <a href="/" class="btn-outline">Return Home</a>
            </div>
        </div>

        <!-- Registration form -->
        <div th:if="${token != null}" class="card">
            <div class="card-header">
                <h1>Create Your Account</h1>
                <p>Set up your Location Partner login to manage your property's availability</p>
            </div>
            <div class="card-body">
                <div class="partner-badge" th:if="${partnerName != null}" th:text="${partnerName}">Partner Name</div>

                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <form th:action="@{/location-partner/register/{token}(token=${token})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" th:value="${email}" readonly>
                        <div class="help-text">This is the email you used in your application.</div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="required">First Name</label>
                            <input type="text" name="firstName" required maxlength="100" th:value="${firstName}">
                        </div>
                        <div class="form-group">
                            <label class="required">Last Name</label>
                            <input type="text" name="lastName" required maxlength="100" th:value="${lastName}">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Phone (optional)</label>
                        <input type="tel" name="phone" maxlength="20" th:value="${phone}">
                    </div>

                    <div class="form-group">
                        <label class="required">Username</label>
                        <input type="text" name="username" required minlength="3" maxlength="50"
                               pattern="[a-zA-Z0-9_.-]+" th:value="${username}"
                               placeholder="Choose a username">
                        <div class="help-text">3+ characters. Letters, numbers, dots, dashes, underscores.</div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label class="required">Password</label>
                            <input type="password" name="password" required minlength="6" id="password">
                            <div class="help-text">At least 6 characters.</div>
                        </div>
                        <div class="form-group">
                            <label class="required">Confirm Password</label>
                            <input type="password" name="confirmPassword" required minlength="6" id="confirmPassword">
                        </div>
                    </div>

                    <div class="form-group" style="background: #f8fafc; padding: 12px 14px; border-radius: 8px; border: 1px solid #e5e7eb;">
                        <div style="display: flex; gap: 10px; align-items: flex-start;">
                            <input type="checkbox" id="agreeToTerms" name="agreeToTerms" value="true" required
                                   style="margin-top: 4px; width: 18px; height: 18px;">
                            <label for="agreeToTerms" style="font-size: 14px; color: #333; line-height: 1.5; margin: 0;">
                                I agree to the
                                <a href="/terms" target="_blank" rel="noopener" style="color: #667eea; text-decoration: underline; font-weight: 600;">SafelyNested Terms and Conditions</a>. <span style="color:#dc3545;">*</span>
                            </label>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary">Create Account</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Client-side password match validation
        (function() {
            var pw = document.getElementById('password');
            var cpw = document.getElementById('confirmPassword');
            function check() {
                if (cpw.value && pw.value !== cpw.value) {
                    cpw.setCustomValidity('Passwords do not match.');
                } else {
                    cpw.setCustomValidity('');
                }
            }
            if (pw && cpw) {
                pw.addEventListener('input', check);
                cpw.addEventListener('input', check);
            }
        })();
    </script>
</body>
</html>
