<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donation Cancelled - SafelyNested</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: #f5f7fa; min-height: 100vh; }
        .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .navbar-brand { font-size: 24px; font-weight: bold; text-decoration: none; color: white; }
        .nav-links { display: flex; gap: 10px; }
        .nav-link { color: white; text-decoration: none; padding: 8px 16px; border-radius: 5px; transition: background 0.3s; }
        .nav-link:hover { background: rgba(255,255,255,0.2); }
        .container { max-width: 550px; margin: 80px auto; padding: 0 20px; text-align: center; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); padding: 50px 30px; }
        .icon { width: 70px; height: 70px; background: #fef3c7; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
        .icon svg { width: 36px; height: 36px; color: #d97706; }
        h1 { font-size: 24px; color: #333; margin-bottom: 12px; }
        p { color: #666; font-size: 16px; margin-bottom: 8px; }
        .reassurance { background: #f0fdf4; padding: 12px; border-radius: 8px; color: #059669; font-size: 14px; margin: 20px 0; }
        .actions { margin-top: 24px; }
        .btn { display: inline-block; padding: 12px 24px; border-radius: 6px; text-decoration: none; font-weight: 600; margin: 5px; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-outline { background: white; color: #667eea; border: 2px solid #667eea; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">SafelyNested</a>
        <div class="nav-links">
            <a href="/" class="nav-link">Home</a>
            <a href="/donate" class="nav-link">Donate</a>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <div class="icon">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            </div>
            <h1>Donation Not Completed</h1>
            <p>Your donation was not processed.</p>
            <div class="reassurance">No charges were made to your payment method.</div>
            <p style="font-size: 14px;">If you experienced an issue, please try again or contact us for assistance.</p>
            <div class="actions">
                <a href="/donate" class="btn btn-primary">Try Again</a>
                <a href="/" class="btn btn-outline">Return Home</a>
            </div>
        </div>
    </div>
</body>
</html>
