spring.profiles.active=local

# Session tracking: cookies only (never URL rewriting like ;jsessionid=...)
# Spring Security's StrictHttpFirewall rejects any URL containing ';' as a
# potentially malicious path-parameter injection. URL rewriting is disabled
# by default in Spring Boot 3+ but we set this explicitly so an upstream
# misconfiguration can't re-enable it.
server.servlet.session.tracking-modes=cookie